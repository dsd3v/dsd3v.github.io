ment.body.appendChild(projectsContainer);},title:"Projects"},"/about":{id:"about",renderPageFunc:()=>{var aboutContainer=document.createElement("section");aboutContainer.className="page-container";aboutContainer.id="about-container";var pageTitle=document.createElement("h1");pageTitle.className="page-title";pageTitle.appendChild(document.createTextNode("About"));var textDiv=document.createElement("div");textDiv.textContent="~6 years of full-stack development experience specializing in front-end development with ReactJS and NodeJS / Java REST API back-ends and MySQL / MongoDB / Neo4j databases. \n\n Currently, I am gaining experience with AI-integrated Software Engineering & Data Science as a Work-Study Apprentice at Flatiron School, where I am contributing to the development of AI-powered EdTech tools with NextJS, NodeJS, Python / FastAPI, and PostgreSQL / Supabase while simultaneously completing AI, Data Science, and Machine Learning-related coursework, with a projected graduation in April 2027.";aboutContainer.appendChild(pageTitle);aboutContainer.appendChild(textDiv);document.body.appendChild(aboutContainer);},title:"About"},"/contact":{id:"contact",renderPageFunc:()=>{var contactContainer=document.createElement("section");contactContainer.className="page-container";contactContainer.id="contact-container";var pageTitle=document.createElement("h1");pageTitle.className="page-title";pageTitle.appendChild(document.createTextNode("Contact"));var emailSpan=document.createElement("span");emailSpan.appendChild(document.createTextNode("Email: david.sordia0@gmail.com"));var linkedInExternalLink=document.createElement("a");linkedInExternalLink.className="external-link";linkedInExternalLink.href="https://linkedin.com/in/david-sordia-a555493a9";linkedInExternalLink.rel="noopener noreferrer";linkedInExternalLink.target="_blank";linkedInExternalLink.appendChild(document.createTextNode("LinkedIn ↗"));linkedInExternalLink.style.paddingTop="25px";contactContainer.appendChild(pageTitle);contactContainer.appendChild(emailSpan);contactContainer.appendChild(linkedInExternalLink);document.body.appendChild(contactContainer);},title:"Contact"}};appRoutesToConfigs["/"].renderPageFunc=()=>{var homeContainer=document.createElement("section");homeContainer.id="home-container";var h1=document.createElement("h1");h1.appendChild(document.createTextNode("David Sordia"));var h2=document.createElement("h2");h2.appendChild(document.createTextNode("AI Engineering Apprentice"));var homeNavigationDiv=document.createElement("div");homeNavigationDiv.id="home-navigation-div";Object.entries(appRoutesToConfigs).slice(2).forEach(([route,{title}])=>{var homeNavigationLink=document.createElement("a");homeNavigationLink.className="home-navigation-link";homeNavigationLink.href=route;homeNavigationLink.appendChild(document.createTextNode(title));homeNavigationLink.addEventListener("click",event=>{event.preventDefault();navigate({toRoute:route});});homeNavigationDiv.appendChild(homeNavigationLink);});homeContainer.appendChild(h1);homeContainer.appendChild(h2);homeContainer.appendChild(homeNavigationDiv);document.body.appendChild(homeContainer);};var renderNavbar=()=>{var nav=document.createElement("nav");var homeNavbarLink=document.createElement("a");homeNavbarLink.id="home-navbar-link";homeNavbarLink.href="/";homeNavbarLink.appendChild(document.createTextNode(appRoutesToConfigs["/"].title));homeNavbarLink.addEventListener("click",event=>{event.preventDefault();navigate({toRoute:"/"});});var navbarLinksDiv=document.createElement("div");navbarLinksDiv.id="navbar-links-div";Object.entries(appRoutesToConfigs).slice(2).forEach(([route,{id,title}])=>{var navbarLink=document.createElement("a");navbarLink.classList.add("navbar-link");navbarLink.href=route;navbarLink.id=`${id}-navbar-link`;navbarLink.appendChild(document.createTextNode(title));navbarLinksDiv.appendChild(navbarLink);});navbarLinksDiv.addEventListener("click",event=>{event.preventDefault();var navbarLinkClicked=event.target.closest(".navbar-link");if(navbarLinkClicked)navigate({toRoute:new URL(navbarLinkClicked.href).pathname});});var navbarToggle=document.createElement("div");navbarToggle.id="navbar-toggle";navbarToggle.setAttribute("aria-label","Navigation Links Menu Toggle");var hamburger=document.createElement("div");hamburger.id="hamburger";hamburger.appendChild(document.createElement("span"));hamburger.appendChild(document.createElement("span"));hamburger.appendChild(document.createElement("span"));var arrow=document.createElement("span");arrow.id="arrow";arrow.appendChild(document.createTextNode("▾"));navbarToggle.appendChild(hamburger);navbarToggle.appendChild(arrow);navbarToggle.addEventListener("click",event=>{event.preventDefault();if(navbarToggle.classList.contains("active-navbar-toggle")){navbarToggle.classList.remove("active-navbar-toggle");navbarLinksDiv.classList.remove("navbar-links-menu-open");}else{navbarToggle.classList.add("active-navbar-toggle");navbarLinksDiv.classList.add("navbar-links-menu-open");}});nav.appendChild(homeNavbarLink);nav.appendChild(navbarLinksDiv);nav.appendChild(navbarToggle);document.body.appendChild(nav);};var renderPageNotFound=()=>{var pageNotFoundContainer=document.createElement("section");pageNotFoundContainer.className="page-container";pageNotFoundContainer.id="page-not-found-container";var pageNotFoundTitle=document.createElement("h1");pageNotFoundTitle.id="page-not-found-title";pageNotFoundTitle.appendChild(document.createTextNode("Page not found."));var invalidUrlSpan=document.createElement("span");invalidUrlSpan.appendChild(document.createTextNode("Invalid URL entered."));pageNotFoundContainer.appendChild(pageNotFoundTitle);pageNotFoundContainer.appendChild(invalidUrlSpan);document.body.appendChild(pageNotFoundContainer);};var removePreviousPage=()=>{var prevPageNavbarLink=document.getElementsByClassName("active-navbar-link")[0];if(prevPageNavbarLink){prevPageNavbarLink.classList.remove("active-navbar-link");var prevRoute=new URL(prevPageNavbarLink.href).pathname;var prevRouteConfig=appRoutesToConfigs[prevRoute];if(prevRouteConfig){var prevPageContainer=document.getElementById(`${prevRouteConfig.id}-container`);if(prevPageContainer)prevPageContainer.remove();}}else{var pageNotFoundContainer=document.getElementById("page-not-found-container");if(pageNotFoundContainer)pageNotFoundContainer.remove();}};var renderNewPage=({newPageRoute,shouldUpdateUrl})=>{document.getElementById("navbar-toggle").classList.remove("active-navbar-toggle");document.getElementById("navbar-links-div").classList.remove("navbar-links-menu-open");if(shouldUpdateUrl)window.history.pushState(null,null,newPageRoute);var newRouteConfig=appRoutesToConfigs[newPageRoute];if(newRouteConfig){document.getElementById(`${newRouteConfig.id}-navbar-link`).classList.add("active-navbar-link");newRouteConfig.renderPageFunc();}else{renderPageNotFound();}};var getCleanedRoutePath=({routePath})=>{var cleanedRoutePath=routePath;if(routePath.length>1&&routePath.endsWith("/"))cleanedRoutePath=routePath.slice(0,-1);return cleanedRoutePath;};var navigate=({isFromPopState=false,isFromUrl=false,toRoute})=>{var currentRoute=getCleanedRoutePath({routePath:window.location.pathname});if(isFromUrl||isFromPopState||currentRoute!==toRoute){removePreviousPage();renderNewPage({newPageRoute:getCleanedRoutePath({routePath:toRoute}),shouldUpdateUrl:!isFromPopState&&!isFromUrl});}};(()=>{var initializeApp=()=>{document.addEventListener("DOMContentLoaded",()=>{renderNavbar();var redirectPath=sessionStorage.getItem("redirectPath");if(redirectPath){sessionStorage.removeItem("redirectPath");window.history.replaceState(null, null,redirectPath);};navigate({isFromUrl:true,toRoute:window.location.pathname});});window.addEventListener("popstate",event=>{event.preventDefault();navigate({isFromPopState:true,toRoute:window.location.pathname});});};initializeApp();})();</script></body></html>
